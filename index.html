<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Controlador de gastos</title>
</head>
<body>
    <main>
        <h1>Controle de gastos</h1>
        <form>
            <input type="number" name="valor" placeholder="Digite o valor gasto">
            <select name="categoria">
                <option value="alimentacao">Alimentação</option>
                <option value="transporte">Transporte</option>
                <option value="lazer">Lazer</option>
                <option value="outros">Outros</option>
            </select>
            <button type="submit">Adicionar</button>
        </form>
        <p id="alimentacao">Alimentação: R$ 0,00</p>
        <p id="transporte">Transporte: R$ 0,00</p>
        <p id="lazer">Lazer: R$ 0,00</p>
        <p id="outros">Outros: R$ 0,00</p>
        <p id="total">Total: R$ 0,00</p>
    </main>
    
    <script type="module" src="/js/app.js"></script>
</body>
</html>
